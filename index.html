<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#070014" />
  <meta name="description" content="NEON DRIFT — an endless synthwave hover-racer built with Three.js." />
  <title>NEON DRIFT</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />

  <!-- Three.js straight from a CDN via an import map: no build step, no install. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- in-run HUD -->
  <div id="hud" class="hidden">
    <div class="hud-block hud-tl">
      <span class="label">SCORE</span>
      <span id="score" class="value">0</span>
    </div>
    <div class="hud-block hud-tr">
      <span class="label">BEST</span>
      <span id="best" class="value">0</span>
    </div>
    <div class="hud-block hud-bl">
      <span id="speed" class="value">0</span>
      <span class="label">KM/H</span>
    </div>
    <div id="combo" class="hidden">x2</div>
  </div>

  <!-- title screen -->
  <div id="title" class="overlay">
    <div class="overlay-inner">
      <h1 class="game-title" data-text="NEON DRIFT">NEON DRIFT</h1>
      <p class="tagline">OUTRUN THE GRID</p>
      <div class="start-prompt">PRESS&nbsp;<kbd>SPACE</kbd>&nbsp;OR&nbsp;CLICK&nbsp;TO&nbsp;FLY</div>
      <div class="controls">
        <span><kbd>A</kbd><kbd>D</kbd> / <kbd>&larr;</kbd><kbd>&rarr;</kbd> steer</span>
        <span><kbd>SHIFT</kbd> boost</span>
        <span>MOUSE to steer</span>
      </div>
      <div id="title-best" class="title-best"></div>
    </div>
  </div>

  <!-- game over -->
  <div id="gameover" class="overlay hidden">
    <div class="overlay-inner">
      <div id="new-best" class="new-best hidden">NEW RECORD</div>
      <h2 class="go-title">SIGNAL LOST</h2>
      <div class="final"><span class="label">SCORE</span><span id="final-score" class="value">0</span></div>
      <div id="final-best" class="final-best">BEST 0</div>
      <div class="start-prompt">PRESS&nbsp;<kbd>SPACE</kbd>&nbsp;TO&nbsp;RETRY</div>
    </div>
  </div>

  <!-- white impact flash on crash -->
  <div id="hit-flash"></div>

  <div id="mute" class="mute">♪ SOUND ON  [M]</div>

  <!-- shown only if WebGL fails -->
  <div id="fallback" class="overlay hidden">
    <div class="overlay-inner">
      <h2 class="go-title">NO SIGNAL</h2>
      <p class="tagline">This game needs a WebGL2-capable browser.<br />Try the latest Chrome, Edge or Firefox.</p>
    </div>
  </div>

  <noscript>
    <div class="overlay"><div class="overlay-inner"><h2 class="go-title">NEON DRIFT</h2><p class="tagline">Please enable JavaScript to play.</p></div></div>
  </noscript>

  <script type="module" src="src/main.js"></script>
</body>
</html>
